version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cyclewarden-app-prod
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_APP_URL=http://localhost:3000
      - DATABASE_URL=postgresql://cyclewarden:cyclewarden@db:5432/cyclewarden
      - BETTER_AUTH_SECRET=change-me-to-a-long-random-string-at-least-32-chars
      - BETTER_AUTH_URL=http://localhost:3000/api/auth
      - AUTH_ADAPTER=better-auth
      # Optional: set GOOGLE_CLIENT_ID, GITHUB_CLIENT_ID, RESEND_API_KEY, S3_BUCKET here
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    container_name: cyclewarden-db-prod
    restart: always
    environment:
      - POSTGRES_USER=cyclewarden
      - POSTGRES_PASSWORD=cyclewarden
      - POSTGRES_DB=cyclewarden
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cyclewarden"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
