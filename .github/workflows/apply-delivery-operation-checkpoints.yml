name: Apply delivery operation checkpoints

on:
  push:
    branches:
      - agent/delivery-operation-checkpoints
    paths:
      - scripts/apply-delivery-operation-checkpoints.py
      - .github/workflows/apply-delivery-operation-checkpoints.yml

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Apply exact source patch
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("scripts/apply-delivery-operation-checkpoints.py")
          text = path.read_text(encoding="utf-8")
          text = text.replace(
              '      () =>\n        publishDelivery({',
              '      async () =>\n        publishDelivery({',
          )
          text = text.replace(
              '          body: bodyFile ? readFile(resolve(bodyFile), "utf8") : undefined,',
              '          body: bodyFile ? await readFile(resolve(bodyFile), "utf8") : undefined,',
          )
          path.write_text(text, encoding="utf-8")
          PY
          python scripts/apply-delivery-operation-checkpoints.py
          git diff --check

      - name: Commit final integration
        run: |
          rm scripts/apply-delivery-operation-checkpoints.py
          rm .github/workflows/apply-delivery-operation-checkpoints.yml
          git config user.name "CycleWarden Automation"
          git config user.email "cyclewarden@local"
          git add --all
          git commit -m "Add write-ahead delivery operation leases"
          git push origin HEAD:${{ github.ref_name }}
