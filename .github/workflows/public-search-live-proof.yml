name: Public Search Live Proof

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  live-provider:
    name: Live GitHub repository-search proof
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @shipkit/evolution-core build
      - name: Query live public provider
        run: |
          mkdir -p artifacts
          node --input-type=module <<'NODE'
          import { createHash } from 'node:crypto';
          import { writeFile } from 'node:fs/promises';
          import { createGitHubRepositorySearchProvider } from './packages/evolution-core/dist/index.js';

          const provider = createGitHubRepositorySearchProvider();
          const cases = [
            { query: 'shipkit in:name user:Thunderkill016', expected: 'Thunderkill016/shipkit' },
            { query: 'vitest in:name user:vitest-dev', expected: 'vitest-dev/vitest' },
          ];
          const runs = [];
          for (const item of cases) {
            const response = await provider.search({
              query: item.query,
              maxResults: 5,
              now: new Date().toISOString(),
              timeoutMs: 15_000,
              maxBytes: 512 * 1024,
            });
            const titles = response.results.map((result) => result.title);
            if (!titles.includes(item.expected)) {
              throw new Error(`live search did not return ${item.expected}: ${titles.join(', ')}`);
            }
            if (response.incomplete || response.results.length === 0) {
              throw new Error(`live search returned incomplete or empty results for ${item.query}`);
            }
            runs.push({
              query: item.query,
              expected: item.expected,
              searchedAt: response.searchedAt,
              totalCount: response.totalCount,
              responseDigest: response.responseDigest,
              results: response.results.map((result) => ({
                rank: result.rank,
                title: result.title,
                canonicalUrl: result.canonicalUrl,
                resultDigest: result.resultDigest,
              })),
            });
          }
          const report = { provider: provider.id, runs };
          const digest = `sha256:${createHash('sha256').update(JSON.stringify(report)).digest('hex')}`;
          await writeFile('artifacts/public-search-live-proof.json', `${JSON.stringify({ ...report, digest }, null, 2)}\n`);
          console.log(JSON.stringify({ ...report, digest }, null, 2));
          NODE
      - name: Upload live proof
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: public-search-live-proof
          retention-days: 14
          path: artifacts/public-search-live-proof.json
