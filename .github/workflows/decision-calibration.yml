name: Decision Calibration

on:
  push:
    branches:
      - agent/decision-calibration

permissions:
  contents: read

jobs:
  calibrate:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build current merged Evolution Core
        run: pnpm --filter @shipkit/evolution-core build
      - name: Run fixed Shipkit-on-Shipkit calibration
        run: node scripts/run-decision-calibration.mjs
      - name: Upload complete calibration evidence
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: decision-calibration-report
          if-no-files-found: error
          retention-days: 14
          path: artifacts/decision-calibration-report.json
