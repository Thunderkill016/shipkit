name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  # Stable host for cookies + Playwright (P2 e2e harden)
  PLAYWRIGHT_HOST: 127.0.0.1
  PORT: "3000"

jobs:
  test-and-build:
    name: Test & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
      - run: pnpm build
      - run: pnpm doctor || true
      - run: pnpm check:deploy || true

  evolution-core-standalone:
    name: Evolution Core standalone / Node ${{ matrix.node }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22, 24]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Workspace package typecheck
        run: pnpm --filter @cyclewarden/evolution-core typecheck
      - name: Workspace package tests
        run: pnpm --filter @cyclewarden/evolution-core test
      - name: Clean standalone install, pack and consumer proof
        run: node scripts/test-evolution-core-standalone.mjs

  evolution-engine-proof:
    name: Evolution Engine Proof
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build Evolution Engine
        run: pnpm --filter @cyclewarden/evolution-core build
      - name: Dogfood CycleWarden assessment
        run: node scripts/test-evolution-cli.mjs
      - name: Upload Evolution dogfood diagnostics
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: evolution-dogfood-diagnostics
          if-no-files-found: warn
          retention-days: 7
          path: artifacts/evolution-dogfood-report.json
      - name: Assess pinned external repository
        run: node scripts/test-evolution-external-repo.mjs
      - name: Run fixed named-candidate research proof
        run: node scripts/test-candidate-research.mjs
      - name: Upload named-candidate research proof
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: candidate-research-proof
          if-no-files-found: warn
          retention-days: 14
          path: artifacts/candidate-research-proof.json
      - name: Run deterministic public-search proof
        run: node scripts/test-public-search.mjs
      - name: Upload public-search proof
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: public-search-proof
          if-no-files-found: warn
          retention-days: 14
          path: artifacts/public-search-proof.json

  sandbox-docker-proof:
    name: Sandbox / hostile Docker proof
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build Evolution Engine
        run: pnpm --filter @cyclewarden/evolution-core build
      - name: Explicitly provision local sandbox image
        shell: bash
        run: |
          set -euo pipefail
          docker pull node:22-bookworm-slim
          image_id="$(docker image inspect node:22-bookworm-slim --format '{{.Id}}')"
          [[ "$image_id" =~ ^sha256:[a-f0-9]{64}$ ]]
          echo "CYCLEWARDEN_SANDBOX_IMAGE=$image_id" >> "$GITHUB_ENV"
      - name: Run hostile sandbox fixture
        shell: bash
        run: |
          set -o pipefail
          mkdir -p artifacts
          node scripts/test-sandbox-docker.mjs 2>&1 | tee artifacts/sandbox-docker-proof.log
        env:
          CYCLEWARDEN_HOST_SECRET: ci-secret-must-not-enter-sandbox
      - name: Upload hostile sandbox diagnostics
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: sandbox-docker-proof
          if-no-files-found: warn
          retention-days: 7
          path: artifacts/sandbox-docker-proof.log

  e2e-demo:
    name: E2E / demo mode
    runs-on: ubuntu-latest
    needs: test-and-build
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install Playwright Chromium
        run: pnpm --filter @cyclewarden/web exec playwright install chromium --with-deps
      - name: E2E smoke (demo)
        run: pnpm test:e2e
        env:
          CI: true
          NEXT_PUBLIC_APP_URL: http://127.0.0.1:3000
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:3000

  e2e-portable-pg:
    name: E2E / portable-pg
    runs-on: ubuntu-latest
    needs: test-and-build
    if: ${{ github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository }}
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: cyclewarden
          POSTGRES_PASSWORD: cyclewarden
          POSTGRES_DB: cyclewarden
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Migrate database
        run: pnpm db:migrate
        env:
          DATABASE_URL: postgresql://cyclewarden:cyclewarden@localhost:5432/cyclewarden
      - name: Install Playwright Chromium
        run: pnpm --filter @cyclewarden/web exec playwright install chromium --with-deps
      - name: E2E auth + isolation
        run: pnpm test:e2e
        env:
          CI: true
          NEXT_PUBLIC_APP_URL: http://127.0.0.1:3000
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:3000
          BETTER_AUTH_URL: http://127.0.0.1:3000
          DATABASE_URL: postgresql://cyclewarden:cyclewarden@localhost:5432/cyclewarden
          BETTER_AUTH_SECRET: ci-test-secret-at-least-32-characters-long!!
          AUTH_ADAPTER: better-auth
      - name: Upload portable-pg Playwright evidence
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: portable-pg-playwright-evidence
          if-no-files-found: warn
          retention-days: 7
          path: |
            apps/web/test-results
            apps/web/playwright-report
