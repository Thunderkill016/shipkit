name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  # Stable host for cookies + Playwright (P2 e2e harden)
  PLAYWRIGHT_HOST: 127.0.0.1
  PORT: "3000"

jobs:
  test-and-build:
    name: Test & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
      - run: pnpm build
      - run: pnpm doctor || true
      - run: pnpm check:deploy || true

  evolution-engine-proof:
    name: Evolution Engine Proof
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build Evolution Engine
        run: pnpm --filter @shipkit/evolution-core build
      - name: Dogfood Shipkit assessment
        run: node scripts/test-evolution-cli.mjs
      - name: Assess pinned external repository
        run: node scripts/test-evolution-external-repo.mjs

  e2e-demo:
    name: E2E / demo mode
    runs-on: ubuntu-latest
    needs: test-and-build
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install Playwright Chromium
        run: pnpm --filter @shipkit/web exec playwright install chromium --with-deps
      - name: E2E smoke (demo)
        run: pnpm test:e2e
        env:
          CI: true
          NEXT_PUBLIC_APP_URL: http://127.0.0.1:3000
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:3000

  e2e-portable-pg:
    name: E2E / portable-pg
    runs-on: ubuntu-latest
    needs: test-and-build
    if: ${{ github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository }}
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: shipkit
          POSTGRES_PASSWORD: shipkit
          POSTGRES_DB: shipkit
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Migrate database
        run: pnpm db:migrate
        env:
          DATABASE_URL: postgresql://shipkit:shipkit@localhost:5432/shipkit
      - name: Install Playwright Chromium
        run: pnpm --filter @shipkit/web exec playwright install chromium --with-deps
      - name: E2E auth + isolation
        run: pnpm test:e2e
        env:
          CI: true
          NEXT_PUBLIC_APP_URL: http://127.0.0.1:3000
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:3000
          BETTER_AUTH_URL: http://127.0.0.1:3000
          DATABASE_URL: postgresql://shipkit:shipkit@localhost:5432/shipkit
          BETTER_AUTH_SECRET: ci-test-secret-at-least-32-characters-long!!
          AUTH_ADAPTER: better-auth
      - name: Upload portable-pg Playwright evidence
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: portable-pg-playwright-evidence
          if-no-files-found: warn
          retention-days: 7
          path: |
            apps/web/test-results
            apps/web/playwright-report
