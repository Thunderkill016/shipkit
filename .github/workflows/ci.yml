name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          # Must match package.json "packageManager": "pnpm@9.15.0"
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
      - run: pnpm doctor || true
      - run: pnpm build
      - name: Install Playwright Chromium
        run: pnpm --filter @shipkit/web exec playwright install chromium --with-deps
      - name: E2E smoke
        run: pnpm test:e2e
        env:
          CI: true
