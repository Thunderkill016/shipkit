name: Apply public delivery API lease protection

on:
  push:
    branches:
      - agent/protect-public-delivery-api
    paths:
      - .github/workflows/apply-public-delivery-api-leases.yml

permissions:
  contents: write

jobs:
  patch-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/protect-public-delivery-api
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Apply exact-source refactor
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> None:
              file_path = Path(path)
              text = file_path.read_text(encoding="utf-8")
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"expected one match in {path}, found {count}: {old[:100]!r}")
              file_path.write_text(text.replace(old, new), encoding="utf-8")

          delivery = "packages/evolution-core/src/delivery.ts"
          replace_once(
              delivery,
              '''import {
            TrustedLocalExecutionBackend,
            type ExecutionBackendResult,
          } from "./execution-backend.js";
          import { EvolutionStore, cycleStorageDirectoryName } from "./persistence.js";
          ''',
              '''import {
            TrustedLocalExecutionBackend,
            type ExecutionBackendResult,
          } from "./execution-backend.js";
          import { withDeliveryOperation } from "./delivery-operation.js";
          import { EvolutionStore, cycleStorageDirectoryName } from "./persistence.js";
          ''',
          )
          replace_once(
              delivery,
              "export async function executeDelivery(input: ExecuteDeliveryInput) {",
              "async function executeDeliveryUnprotected(input: ExecuteDeliveryInput) {",
          )
          replace_once(
              delivery,
              '''  return { authorization, cycle, execution, worktreePath, controlPath: controlPath(input.store, planned.cycleId) };
          }

          function checkRecord(''',
              '''  return { authorization, cycle, execution, worktreePath, controlPath: controlPath(input.store, planned.cycleId) };
          }

          export async function executeDelivery(input: ExecuteDeliveryInput) {
            const protectedResult = await withDeliveryOperation(
              {
                store: input.store,
                cycleId: input.cycleId,
                projectRoot: input.projectRoot,
                actor: input.actor,
                operation: "execute",
                now: input.now,
              },
              () => executeDeliveryUnprotected(input)
            );
            return protectedResult.value;
          }

          function checkRecord(''',
          )
          replace_once(
              delivery,
              "export async function verifyDelivery(input: VerifyDeliveryInput) {",
              "async function verifyDeliveryUnprotected(input: VerifyDeliveryInput) {",
          )
          replace_once(
              delivery,
              '''  return { cycle, verification, branchName: control.execution.branchName, worktreePath: control.worktreePath };
          }

          export async function showDelivery''',
              '''  return { cycle, verification, branchName: control.execution.branchName, worktreePath: control.worktreePath };
          }

          export async function verifyDelivery(input: VerifyDeliveryInput) {
            const protectedResult = await withDeliveryOperation(
              {
                store: input.store,
                cycleId: input.cycleId,
                projectRoot: input.projectRoot,
                actor: input.actor,
                operation: "verify",
                now: input.now,
              },
              () => verifyDeliveryUnprotected(input)
            );
            return protectedResult.value;
          }

          export async function showDelivery''',
          )

          publish = "packages/evolution-core/src/delivery-publish.ts"
          replace_once(
              publish,
              'import { EvidenceRegistry } from "./evidence.js";\nimport { EvolutionStore, cycleStorageDirectoryName } from "./persistence.js";\n',
              'import { EvidenceRegistry } from "./evidence.js";\nimport { withDeliveryOperation } from "./delivery-operation.js";\nimport { EvolutionStore, cycleStorageDirectoryName } from "./persistence.js";\n',
          )
          replace_once(
              publish,
              "export async function publishDelivery(input: PublishDeliveryInput) {",
              "async function publishDeliveryUnprotected(input: PublishDeliveryInput) {",
          )
          replace_once(
              publish,
              '''  return await finish(
            verifiedDraft ? "published" : "rejected",
            verifiedDraft ? [] : ["created pull request did not match the verified draft publication contract"],
            created.url || createdUrl
          );
          }

          export async function showDeliveryPublication''',
              '''  return await finish(
            verifiedDraft ? "published" : "rejected",
            verifiedDraft ? [] : ["created pull request did not match the verified draft publication contract"],
            created.url || createdUrl
          );
          }

          export async function publishDelivery(input: PublishDeliveryInput) {
            const protectedResult = await withDeliveryOperation(
              {
                store: input.store,
                cycleId: input.cycleId,
                projectRoot: input.projectRoot,
                actor: input.actor,
                operation: "publish",
                now: input.now,
              },
              () => publishDeliveryUnprotected(input)
            );
            return protectedResult.value;
          }

          export async function showDeliveryPublication''',
          )

          cli = "packages/evolution-core/src/delivery-cli.ts"
          replace_once(
              cli,
              '''import {
            reconcileDeliveryOperation,
            showDeliveryOperation,
            withDeliveryOperation,
          } from "./delivery-operation.js";
          ''',
              '''import {
            reconcileDeliveryOperation,
            showDeliveryOperation,
          } from "./delivery-operation.js";
          ''',
          )
          replace_once(
              cli,
              '''  if (command === "execute") {
            const projectRoot = projectRootFrom(parsed);
            const actor = one(parsed, "actor")?.trim() || "cyclewarden-implementer";
            const protectedResult = await withDeliveryOperation(
              { store, cycleId, projectRoot, actor, operation: "execute" },
              () =>
                executeDelivery({
                  store,
                  cycleId,
                  projectRoot,
                  manifestPath: resolve(required(parsed, "manifest")),
                  actor,
                  trustedRepository: one(parsed, "trusted-repository") === "true",
                })
            );
            printJson(io, { ...protectedResult.value, deliveryOperation: protectedResult.operation });
            return 0;
          }
          ''',
              '''  if (command === "execute") {
            const projectRoot = projectRootFrom(parsed);
            const actor = one(parsed, "actor")?.trim() || "cyclewarden-implementer";
            const result = await executeDelivery({
              store,
              cycleId,
              projectRoot,
              manifestPath: resolve(required(parsed, "manifest")),
              actor,
              trustedRepository: one(parsed, "trusted-repository") === "true",
            });
            const deliveryOperation = showDeliveryOperation(store, cycleId).deliveryOperation.record;
            printJson(io, { ...result, deliveryOperation });
            return 0;
          }
          ''',
          )
          replace_once(
              cli,
              '''  if (command === "verify") {
            const projectRoot = projectRootFrom(parsed);
            const actor = one(parsed, "actor")?.trim() || "cyclewarden-independent-verifier";
            const protectedResult = await withDeliveryOperation(
              { store, cycleId, projectRoot, actor, operation: "verify" },
              () => verifyDelivery({ store, cycleId, projectRoot, actor })
            );
            printJson(io, { ...protectedResult.value, deliveryOperation: protectedResult.operation });
            return 0;
          }
          ''',
              '''  if (command === "verify") {
            const projectRoot = projectRootFrom(parsed);
            const actor = one(parsed, "actor")?.trim() || "cyclewarden-independent-verifier";
            const result = await verifyDelivery({ store, cycleId, projectRoot, actor });
            const deliveryOperation = showDeliveryOperation(store, cycleId).deliveryOperation.record;
            printJson(io, { ...result, deliveryOperation });
            return 0;
          }
          ''',
          )
          replace_once(
              cli,
              '''  if (command === "publish") {
            const bodyFile = one(parsed, "body-file")?.trim();
            const projectRoot = projectRootFrom(parsed);
            const actor = one(parsed, "actor")?.trim() || "cyclewarden-publisher";
            const protectedResult = await withDeliveryOperation(
              { store, cycleId, projectRoot, actor, operation: "publish" },
              async () =>
                publishDelivery({
                  store,
                  cycleId,
                  projectRoot,
                  actor,
                  draftPr: one(parsed, "draft-pr") === "true",
                  remote: one(parsed, "remote")?.trim() || "origin",
                  hostname: one(parsed, "hostname")?.trim(),
                  baseBranch: one(parsed, "base")?.trim(),
                  title: one(parsed, "title")?.trim(),
                  body: bodyFile ? await readFile(resolve(bodyFile), "utf8") : undefined,
                })
            );
            printJson(io, { ...protectedResult.value, deliveryOperation: protectedResult.operation });
            return 0;
          }
          ''',
              '''  if (command === "publish") {
            const bodyFile = one(parsed, "body-file")?.trim();
            const projectRoot = projectRootFrom(parsed);
            const actor = one(parsed, "actor")?.trim() || "cyclewarden-publisher";
            const result = await publishDelivery({
              store,
              cycleId,
              projectRoot,
              actor,
              draftPr: one(parsed, "draft-pr") === "true",
              remote: one(parsed, "remote")?.trim() || "origin",
              hostname: one(parsed, "hostname")?.trim(),
              baseBranch: one(parsed, "base")?.trim(),
              title: one(parsed, "title")?.trim(),
              body: bodyFile ? await readFile(resolve(bodyFile), "utf8") : undefined,
            });
            const deliveryOperation = showDeliveryOperation(store, cycleId).deliveryOperation.record;
            printJson(io, { ...result, deliveryOperation });
            return 0;
          }
          ''',
          )

          tests = "packages/evolution-core/src/delivery-operation.test.ts"
          replace_once(
              tests,
              '''} from "./delivery-operation.js";
          import { TrustedLocalExecutionBackend } from "./execution-backend.js";
          ''',
              '''} from "./delivery-operation.js";
          import { executeDelivery, verifyDelivery } from "./delivery.js";
          import { publishDelivery } from "./delivery-publish.js";
          import { TrustedLocalExecutionBackend } from "./execution-backend.js";
          ''',
          )
          replace_once(
              tests,
              '''  it("blocks a second operation while the first owner lease is active", async () => {''',
              '''  it("protects direct executeDelivery calls before delivery preconditions run", async () => {
            const current = await fixture("public-execute");
            await expect(
              executeDelivery({
                store: current.store,
                cycleId: current.cycleId,
                projectRoot: current.projectRoot,
                manifestPath: join(current.root, "missing-delivery.json"),
                actor: "api-implementer",
                trustedRepository: false,
              })
            ).rejects.toThrow(/trusted repository acknowledgement/);

            const inspection = inspectDeliveryOperation(current.store, current.cycleId);
            expect(inspection.controlStatus).toBe("valid");
            expect(inspection.record?.operation).toBe("execute");
            expect(inspection.record?.actor).toBe("api-implementer");
            expect(inspection.record?.status).toBe("failed");
            expect(inspection.lockPresent).toBe(false);
          });

          it("protects direct verifyDelivery calls before repository validation", async () => {
            const current = await fixture("public-verify");
            await expect(
              verifyDelivery({
                store: current.store,
                cycleId: current.cycleId,
                projectRoot: current.projectRoot,
                actor: "api-verifier",
              })
            ).rejects.toThrow();

            const inspection = inspectDeliveryOperation(current.store, current.cycleId);
            expect(inspection.controlStatus).toBe("valid");
            expect(inspection.record?.operation).toBe("verify");
            expect(inspection.record?.actor).toBe("api-verifier");
            expect(inspection.record?.status).toBe("failed");
            expect(inspection.lockPresent).toBe(false);
          });

          it("protects direct publishDelivery calls before publication opt-in checks", async () => {
            const current = await fixture("public-publish");
            await expect(
              publishDelivery({
                store: current.store,
                cycleId: current.cycleId,
                projectRoot: current.projectRoot,
                actor: "api-publisher",
                draftPr: false,
              })
            ).rejects.toThrow(/explicit --draft-pr opt-in/);

            const inspection = inspectDeliveryOperation(current.store, current.cycleId);
            expect(inspection.controlStatus).toBe("valid");
            expect(inspection.record?.operation).toBe("publish");
            expect(inspection.record?.actor).toBe("api-publisher");
            expect(inspection.record?.status).toBe("failed");
            expect(inspection.lockPresent).toBe(false);
          });

          it("blocks a second operation while the first owner lease is active", async () => {''',
          )

          leases = Path("docs/evolution/DELIVERY_OPERATION_LEASES.md")
          leases_text = leases.read_text(encoding="utf-8")
          leases_text = leases_text.replace(
              "This slice covers `cyclewarden-deliver execute`, `verify`, and `publish`. It does not claim distributed locking, remote process control, or protection for callers that invoke the library APIs directly.",
              "The same protection now covers both `cyclewarden-deliver` and the exported `executeDelivery`, `verifyDelivery`, and `publishDelivery` library functions. It does not claim distributed locking or remote process control.",
          )
          leases_text = leases_text.replace(
              "- Direct library calls bypass the CLI lease boundary.\n",
              "- Exported delivery mutation APIs are lease-protected by default; unprotected implementations remain module-internal.\n",
          )
          leases_text = leases_text.replace(
              "A later slice can move operation context into the public library API, add remote lease ownership, record publication subprocesses, clean orphan candidates, and integrate stale-operation inspection directly into the web workspace.",
              "A later slice can add remote lease ownership, record publication subprocesses, clean orphan candidates, and integrate stale-operation inspection directly into the web workspace.",
          )
          leases.write_text(leases_text, encoding="utf-8")

          Path("docs/ai/plans/2026-07-24-public-delivery-api-leases.md").write_text(
              """# Protect exported delivery APIs with operation leases

**Date:** 2026-07-24  
**Parent:** issue #44  
**Predecessor:** merged PR #50  
**Status:** implementation candidate

## Decision

Make `executeDelivery`, `verifyDelivery`, and `publishDelivery` lease-protected by default. Their mutation implementations remain module-internal and cannot be imported through the package entrypoint.

## Why

PR #50 protected the CLI path, but a library consumer could still invoke exported delivery functions directly and bypass write-ahead checkpoints, overlap prevention, heartbeat ownership, child-process tracking, and stale-operation recovery.

## Contract

- public function names and result shapes remain unchanged;
- each public call acquires the same per-cycle operation lease before delivery preconditions or mutation begin;
- handled delivery outcomes complete the operation normally, while thrown precondition or boundary failures persist a terminal `failed` operation checkpoint;
- the CLI calls the public functions once and reads the terminal checkpoint for output, avoiding nested leases;
- recovery and inspection APIs remain separate and explicit.

## Verification

Regression coverage proves that direct API calls for execute, verify, and publish leave integrity-valid terminal checkpoints even when they fail before mutation. Existing CLI, engine, publication, recovery, sandbox, package, and browser suites must remain green.

## Boundaries

This is still a local-host lease. It does not add distributed ownership, remote execution, automatic orphan-candidate cleanup, publication subprocess tracking, merge, deployment, production writes, or external product validation.
""",
              encoding="utf-8",
          )
          PY
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Test Evolution Core
        run: pnpm --filter @cyclewarden/evolution-core test
      - name: Commit refactor
        shell: bash
        run: |
          git config user.name "CycleWarden Automation"
          git config user.email "cyclewarden@local"
          git add packages/evolution-core/src/delivery.ts \
            packages/evolution-core/src/delivery-publish.ts \
            packages/evolution-core/src/delivery-cli.ts \
            packages/evolution-core/src/delivery-operation.test.ts \
            docs/evolution/DELIVERY_OPERATION_LEASES.md \
            docs/ai/plans/2026-07-24-public-delivery-api-leases.md
          git commit -m "feat: protect public delivery APIs with operation leases"
          git push origin HEAD:agent/protect-public-delivery-api
