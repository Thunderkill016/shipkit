name: Candidate Research Scaffold

on:
  push:
    branches:
      - agent/candidate-grounded-research

permissions:
  contents: write

jobs:
  scaffold:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/candidate-grounded-research
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Update typed package surfaces
        run: |
          node <<'NODE'
          const fs = require('node:fs');

          const typesPath = 'packages/evolution-core/src/types.ts';
          let types = fs.readFileSync(typesPath, 'utf8');
          const oldAdapter = 'adapter: "manual-bundle" | "repository-single-worker" | "public-http-manifest";';
          const newAdapter = 'adapter: "manual-bundle" | "repository-single-worker" | "public-http-manifest" | "candidate-manifest";';
          if (!types.includes(newAdapter)) {
            if (!types.includes(oldAdapter)) throw new Error('ResearchRunRecord adapter union not found');
            types = types.replace(oldAdapter, newAdapter);
            fs.writeFileSync(typesPath, types);
          }

          const indexPath = 'packages/evolution-core/src/index.ts';
          let index = fs.readFileSync(indexPath, 'utf8');
          const candidateExport = 'export * from "./candidate-research.js";';
          const candidateCliExport = 'export * from "./candidate-cli.js";';
          if (!index.includes(candidateExport)) index += `\n${candidateExport}`;
          if (!index.includes(candidateCliExport)) index += `\n${candidateCliExport}`;
          fs.writeFileSync(indexPath, `${index.trim()}\n`);

          const packagePath = 'packages/evolution-core/package.json';
          const packageJson = JSON.parse(fs.readFileSync(packagePath, 'utf8'));
          packageJson.bin['shipkit-research-candidates'] = './dist/bin-candidate-research.js';
          fs.writeFileSync(packagePath, `${JSON.stringify(packageJson, null, 2)}\n`);

          const rootPath = 'package.json';
          const root = JSON.parse(fs.readFileSync(rootPath, 'utf8'));
          root.scripts['research:candidates'] = 'pnpm --filter @shipkit/evolution-core build && node packages/evolution-core/dist/candidate-cli.js';
          fs.writeFileSync(rootPath, `${JSON.stringify(root, null, 2)}\n`);
          NODE
      - name: Commit scaffolded metadata
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json packages/evolution-core/package.json packages/evolution-core/src/types.ts packages/evolution-core/src/index.ts
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Expose candidate research package surfaces"
          git push origin HEAD:agent/candidate-grounded-research
