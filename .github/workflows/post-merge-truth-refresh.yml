name: Post-merge truth refresh

on:
  push:
    branches:
      - agent/post-merge-truth-refresh

permissions:
  contents: write

jobs:
  refresh:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/post-merge-truth-refresh
          fetch-depth: 0
      - name: Refresh merged capability and priority truth
        run: |
          python - <<'PY'
          from pathlib import Path

          capabilities = Path('docs/CAPABILITIES.json')
          text = capabilities.read_text()
          old_scope = 'Repository evidence and GitHub Actions through merged pull request #38, plus local unit, type, browser and full-repository verification for the gated interactive Evolution Workspace. CycleWarden supports a standalone Evolution Core package on Node.js 20, 22 and 24, durable repository and explicit-source research, manifest-grounded named-candidate decisions, bounded GitHub public repository discovery, and a fail-closed six-session external decision-value pilot protocol whose technical gate is ready. The pilot remains 0/6 with its clock not started; hosted multi-tenant cycle state, general web discovery, direct user decision-value proof, coding-agent delivery, release and measured learning are not claimed.'
          new_scope = 'Repository evidence and GitHub Actions through merged pull requests #41 and #39. CycleWarden supports a standalone Evolution Core package on Node.js 20, 22 and 24, a bounded local A2/R1 workspace from objective through reviewed execution handoff, durable repository and explicit-source research, manifest-grounded named-candidate decisions, bounded GitHub public repository discovery, and a fail-closed six-session external decision-value pilot protocol whose technical operating gate is ready. The pilot remains 0/6 with its clock not started; hosted multi-tenant cycle state, general web discovery, direct user decision-value proof, coding-agent delivery, release and measured learning are not claimed.'
          assert old_scope in text
          text = text.replace(old_scope, new_scope, 1)
          assert 'Local E2E: create through reviewed execution handoff' in text
          text = text.replace('Local E2E: create through reviewed execution handoff', 'CI: E2E create through reviewed execution handoff', 1)
          capabilities.write_text(text)

          model = Path('docs/ai/PROJECT_MODEL.md')
          text = model.read_text()
          assert 'Latest verified merged state through PR #38:' in text
          text = text.replace('Latest verified merged state through PR #38:', 'Latest verified merged state through PRs #41 and #39:', 1)
          old_priority = '''1. Keep one unified product identity and module map.
2. Complete persistence, policy and evidence hardening.
3. Define shared typed contracts and workspace integration skeleton.
4. Expand workspace research beyond the deterministic local repository path.
5. Build real sandbox and interchangeable agent execution.
6. Add independent verification, draft PR and rollback.
7. Add authorized release/deployment and outcome measurement.
8. Add measured learning, MCP/A2A interoperability and hosted team operation.

This order expresses dependency and safety. It does not remove any module from the intended product.'''
          new_priority = '''1. Keep one unified product identity, capability truth and fixed pilot protocol.
2. Keep the merged A2 workspace stable while running exactly six consented external decision audits under #14.
3. Apply the precommitted success, inconclusive, failure or protocol-gap rule without changing thresholds.
4. If successful, build one governed execution vertical slice from approved `ExecutionHandoff` through one real agent, independent verification and a draft PR.
5. If inconclusive, run at most one evidence-targeted redesigned pilot of the same size; if failed, reassess the beachhead, problem and value proposition before expanding capability.
6. Activate broader research, sandbox, release, learning, interoperability or hosted operation only when pilot evidence or a required dependency justifies it.

This order is a product-value gate, not a deletion of the intended full product.'''
          assert old_priority in text
          text = text.replace(old_priority, new_priority, 1)
          model.write_text(text)
          PY

          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add docs/CAPABILITIES.json docs/ai/PROJECT_MODEL.md
          git rm .github/workflows/post-merge-truth-refresh.yml
          git commit -m "Refresh post-merge capability truth"
          git push origin HEAD:agent/post-merge-truth-refresh
