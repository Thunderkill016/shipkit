name: Add delivery lock authority regression

on:
  push:
    branches:
      - agent/delivery-operation-checkpoints
    paths:
      - .github/workflows/add-delivery-lock-race-test.yml

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Add overlapping acquisition regression
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("packages/evolution-core/src/delivery-operation.test.ts")
          text = path.read_text(encoding="utf-8")
          marker = '''  it("recovers an acquisition lock when the primary checkpoint was never renamed", async () => {
          '''
          insertion = '''  it("prefers a different active acquisition lock over an older terminal checkpoint", async () => {
            const current = await fixture("newer-acquisition");
            await withDeliveryOperation(
              {
                store: current.store,
                cycleId: current.cycleId,
                projectRoot: current.projectRoot,
                actor: "previous-operator",
                operation: "execute",
              },
              async () => "done"
            );
            const previous = JSON.parse(
              await readFile(operationPath(current.store, current.cycleId), "utf8")
            ) as DeliveryOperationRecord;
            const acquisition = {
              ...previous,
              operationId: "operation:newer-acquisition",
              actor: "active-operator",
              ownerPid: process.pid,
              childPid: null,
              startedAt: new Date().toISOString(),
              heartbeatAt: new Date().toISOString(),
              completedAt: null,
              status: "running" as const,
              errorDigest: null,
              recoveryEvidenceRef: null,
            };
            const { integrityDigest: _discarded, ...payload } = acquisition;
            await writeFile(
              lockPath(current.store, current.cycleId),
              `${JSON.stringify({ ...payload, integrityDigest: digestJson(payload) }, null, 2)}\\n`,
              "utf8"
            );

            const inspection = inspectDeliveryOperation(current.store, current.cycleId);
            expect(inspection.disposition).toBe("active");
            expect(inspection.record?.operationId).toBe(acquisition.operationId);
            expect(inspection.findings.join(" ")).toMatch(/different operation.*authoritative/);

            const recovery = await reconcileDeliveryOperation({
              store: current.store,
              cycleId: current.cycleId,
              projectRoot: current.projectRoot,
              actor: "recovery-operator",
              apply: true,
            });
            expect(recovery.decision).toBe("blocked");
            expect(recovery.applied).toBe(false);
            expect(recovery.record?.operationId).toBe(acquisition.operationId);
          });

          it("recovers an acquisition lock when the primary checkpoint was never renamed", async () => {
          '''
          if text.count(marker) != 1:
              raise SystemExit(f"expected one insertion marker, found {text.count(marker)}")
          path.write_text(text.replace(marker, insertion), encoding="utf-8")
          PY
          git diff --check

      - name: Commit regression
        run: |
          rm .github/workflows/add-delivery-lock-race-test.yml
          git config user.name "CycleWarden Automation"
          git config user.email "cyclewarden@local"
          git add --all
          git commit -m "Test active acquisition lock authority"
          git push origin HEAD:${{ github.ref_name }}
