name: Evolution Core Lock Refresh

on:
  push:
    branches:
      - agent/standalone-evolution-core

permissions:
  contents: write

jobs:
  refresh-lockfile:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: agent/standalone-evolution-core
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Regenerate workspace lockfile
        run: pnpm install --lockfile-only --no-frozen-lockfile
      - name: Commit generated lockfile
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pnpm-lock.yaml
          if git diff --cached --quiet; then
            echo "Lockfile already current"
            exit 0
          fi
          git commit -m "Refresh evolution core lockfile"
          git push origin HEAD:agent/standalone-evolution-core
