name: AI workflow check

on:
  pull_request:
    paths:
      - "AGENTS.md"
      - "AI_WORKFLOW.md"
      - "docs/CAPABILITIES.json"
      - "docs/ai/**"
      - "docs/evolution/EXTERNAL_SYSTEMS.json"
      - "docs/evolution/pilot/**"
      - "prompts/**"
      - ".agents/**"
      - ".github/**"
      - "scripts/check-ai-workflow.mjs"
      - "scripts/check-capabilities.mjs"
      - "scripts/test-capabilities.mjs"
      - "scripts/check-external-systems.mjs"
      - "scripts/external-systems-validation.mjs"
      - "scripts/test-external-systems.mjs"
      - "scripts/a2-pilot-validation.mjs"
      - "scripts/check-a2-pilot.mjs"
      - "scripts/test-a2-pilot.mjs"
      - "scripts/create-cyclewarden.mjs"
      - "scripts/test-create-cyclewarden.mjs"
      - "scripts/apply-delivery-control-integrity.mjs"
      - "package.json"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node scripts/check-ai-workflow.mjs
      - run: node scripts/test-capabilities.mjs
      - run: node scripts/check-external-systems.mjs
      - run: node scripts/test-external-systems.mjs
      - run: node scripts/check-a2-pilot.mjs
      - run: node scripts/test-a2-pilot.mjs
      - run: node scripts/test-create-cyclewarden.mjs

  apply-delivery-control-integrity:
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'agent/owner-beta-execution-vertical-slice'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node scripts/apply-delivery-control-integrity.mjs
      - name: Commit delivery control integrity hardening
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            packages/evolution-core/src/delivery.ts \
            packages/evolution-core/src/delivery-hardening.test.ts \
            docs/evolution/GOVERNED_DELIVERY.md \
            docs/ai/PROJECT_MODEL.md \
            docs/CAPABILITIES.json
          if git diff --cached --quiet; then
            echo "No control integrity changes to commit."
            exit 0
          fi
          git commit -m "Protect delivery control integrity"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
