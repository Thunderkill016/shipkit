name: AI workflow check

on:
  pull_request:
    paths:
      - "AGENTS.md"
      - "AI_WORKFLOW.md"
      - "docs/CAPABILITIES.json"
      - "docs/ai/**"
      - "docs/evolution/EXTERNAL_SYSTEMS.json"
      - "docs/evolution/pilot/**"
      - "prompts/**"
      - ".agents/**"
      - ".github/**"
      - "scripts/check-ai-workflow.mjs"
      - "scripts/check-capabilities.mjs"
      - "scripts/test-capabilities.mjs"
      - "scripts/check-external-systems.mjs"
      - "scripts/external-systems-validation.mjs"
      - "scripts/test-external-systems.mjs"
      - "scripts/a2-pilot-validation.mjs"
      - "scripts/check-a2-pilot.mjs"
      - "scripts/test-a2-pilot.mjs"
      - "scripts/create-cyclewarden.mjs"
      - "scripts/test-create-cyclewarden.mjs"
      - "package.json"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node scripts/check-ai-workflow.mjs
      - run: node scripts/test-capabilities.mjs
      - run: node scripts/check-external-systems.mjs
      - run: node scripts/test-external-systems.mjs
      - run: node scripts/check-a2-pilot.mjs
      - run: node scripts/test-a2-pilot.mjs
      - run: node scripts/test-create-cyclewarden.mjs
