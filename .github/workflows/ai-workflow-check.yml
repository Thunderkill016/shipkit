name: AI workflow check

on:
  pull_request:
    paths:
      - "AGENTS.md"
      - "AI_WORKFLOW.md"
      - "docs/ai/**"
      - "prompts/**"
      - ".github/**"
      - "scripts/check-ai-workflow.mjs"
      - "package.json"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node scripts/check-ai-workflow.mjs
