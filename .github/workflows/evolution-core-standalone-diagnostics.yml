name: Evolution Core Standalone Diagnostics

on:
  push:
    branches:
      - agent/standalone-evolution-core

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run standalone proof
        run: node scripts/test-evolution-core-standalone.mjs
      - name: Upload standalone diagnostics
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: evolution-core-standalone-node-${{ matrix.node }}
          if-no-files-found: error
          retention-days: 7
          path: artifacts/evolution-core-standalone-diagnostics-*.json
