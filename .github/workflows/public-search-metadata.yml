name: Public Search Metadata

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  record-capability:
    if: ${{ github.actor != 'github-actions[bot]' && github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          fetch-depth: 0
      - name: Record verified public-search boundary
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const path = 'docs/CAPABILITIES.json';
          const registry = JSON.parse(fs.readFileSync(path, 'utf8'));
          const addUnique = (items, values) => {
            for (const value of values) if (!items.includes(value)) items.push(value);
          };

          registry.lastVerified = '2026-07-23';
          registry.verificationScope = 'Repository evidence and GitHub Actions through draft pull request #31. Shipkit now supports a standalone Evolution Core package, durable repository and explicit-source research, manifest-grounded named-candidate decisions, and a bounded GitHub public repository-search provider with persisted ranks, timestamps, digests, falsification queries, exact citations and fail-closed outcomes. General web discovery, direct user decision-value proof, coding-agent delivery, release and measured learning are not yet claimed.';

          const research = registry.capabilities.find((item) => item.id === 'research-intelligence');
          if (!research) throw new Error('research-intelligence capability missing');
          research.summary = 'Shipkit supports manual typed bundles, deterministic repository research, manifest-driven public-source capture, named-candidate comparison and bounded ranked GitHub repository search. Search decisions persist explicit support and falsification queries, provider ranks, result and response digests, selected sources, exact citations, rejected alternatives and fail-closed inconclusive outcomes before independent review.';
          addUnique(research.evidence, [
            'packages/evolution-core/src/public-search.ts',
            'packages/evolution-core/src/search-cli.ts',
            'packages/evolution-core/src/public-search.test.ts',
            'packages/evolution-core/src/public-search-failure.test.ts',
            'packages/evolution-core/src/search-cli.test.ts',
            'packages/evolution-core/src/fixtures/public-search-baseline.json',
            'scripts/test-public-search.mjs',
            'docs/evolution/PUBLIC_SEARCH.md',
          ]);
          addUnique(research.checks, [
            'Public-search tests: ranked support and falsification query provenance with exact citations',
            'Public-search failure tests: duplicate, stale, incomplete, malformed, unsupported and time-budget rejection',
            'Public-search CLI test: persist, reload and project-root symlink confinement',
            'CI proof: deterministic public-search cycle with independent review',
            'One-time live proof: expected Shipkit and Vitest repositories returned from GitHub repository search',
          ]);
          research.limitations = research.limitations.filter(
            (item) => item !== 'Public retrieval requires an explicit URL manifest and does not discover or rank the wider web'
          );
          addUnique(research.limitations, [
            'The only built-in search provider discovers public GitHub repositories; it is not a general web index',
            'Live provider rankings can change; Shipkit persists timestamps and digests rather than promising identical future results',
          ]);

          const publicSource = registry.capabilities.find(
            (item) => item.id === 'public-source-citation-baseline'
          );
          if (!publicSource) throw new Error('public-source-citation-baseline capability missing');
          publicSource.limitations = publicSource.limitations.filter(
            (item) => item !== 'No search discovery or ranking'
          );
          addUnique(publicSource.limitations, [
            'Search discovery exists as a separate GitHub repository-search baseline; general web, browser-rendered and PDF discovery remain unavailable',
          ]);

          const capability = {
            id: 'public-search-discovery-baseline',
            category: 'research',
            status: 'partial',
            verificationStatus: 'passing',
            summary: 'A provider-neutral contract with one built-in GitHub repository-search adapter persists explicit support and falsification queries, ranked results, canonical URLs, provider timestamps, response and result digests, selected-source lineage and exact citations. Duplicate, stale, incomplete, malformed, unsupported or over-budget runs fail closed to a durable inconclusive cycle.',
            evidence: [
              'packages/evolution-core/src/public-search.ts',
              'packages/evolution-core/src/search-cli.ts',
              'packages/evolution-core/src/public-search.test.ts',
              'packages/evolution-core/src/public-search-failure.test.ts',
              'packages/evolution-core/src/search-cli.test.ts',
              'packages/evolution-core/src/fixtures/public-search-baseline.json',
              'scripts/test-public-search.mjs',
              'docs/evolution/PUBLIC_SEARCH.md',
            ],
            checks: [
              'Unit tests: support and falsification query lineage, ranked result digests and citation verification',
              'Unit tests: duplicate, stale, incomplete, malformed, unsupported and time-budget fail-closed outcomes',
              'CLI test: planned-cycle persistence, replay and manifest symlink confinement',
              'CI: deterministic public-search proof',
              'One-time live provider proof against Shipkit and an unrelated Vitest repository query',
            ],
            limitations: [
              'The built-in provider searches public GitHub repositories only and is not a general web index',
              'Unauthenticated provider availability and rate limits are external dependencies; failures become inconclusive',
              'Provider order may change between runs even though each observed response is timestamped and content-digested',
              'No adaptive query reformulation, citation chasing, browser rendering, PDF capture, paid provider or private-source search is implemented',
              'No direct user demand or product decision value is established without the reopened #14 external pilot',
            ],
          };
          const existing = registry.capabilities.findIndex((item) => item.id === capability.id);
          if (existing === -1) {
            const index = registry.capabilities.findIndex(
              (item) => item.id === 'public-source-citation-baseline'
            );
            registry.capabilities.splice(index === -1 ? registry.capabilities.length : index, 0, capability);
          } else {
            registry.capabilities[existing] = capability;
          }
          fs.writeFileSync(path, `${JSON.stringify(registry, null, 2)}\n`);
          NODE
      - name: Commit verified capability metadata
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/CAPABILITIES.json
          git commit -m "Record public search discovery capability"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
