name: Harden delivery operation lock acquisition

on:
  push:
    branches:
      - agent/delivery-operation-checkpoints
    paths:
      - .github/workflows/harden-delivery-operation-lock.yml

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Apply crash-window hardening
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> None:
              file_path = Path(path)
              text = file_path.read_text(encoding="utf-8")
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"expected one match in {path}, found {count}: {old[:100]!r}")
              file_path.write_text(text.replace(old, new), encoding="utf-8")

          module = "packages/evolution-core/src/delivery-operation.ts"
          replace_once(
              module,
              '''import {
            existsSync,
            mkdirSync,
            readFileSync,
            renameSync,
            rmSync,
            writeFileSync,
          } from "node:fs";
          ''',
              '''import {
            closeSync,
            existsSync,
            fsyncSync,
            linkSync,
            mkdirSync,
            openSync,
            readFileSync,
            renameSync,
            rmSync,
            writeFileSync,
          } from "node:fs";
          ''',
          )

          replace_once(
              module,
              '''function lockPath(store: EvolutionStore, cycleId: string): string {
            return join(operationDirectory(store, cycleId), "operation.lock");
          }

          function atomicWriteJsonSync(path: string, value: unknown): void {
            mkdirSync(dirname(path), { recursive: true, mode: 0o700 });
            const temporary = `${path}.${process.pid}.${randomUUID()}.tmp`;
            writeFileSync(temporary, `${JSON.stringify(value, null, 2)}\n`, {
              encoding: "utf8",
              mode: 0o600,
            });
            renameSync(temporary, path);
          }
          ''',
              '''function lockPath(store: EvolutionStore, cycleId: string): string {
            return join(operationDirectory(store, cycleId), "operation.lock");
          }

          function candidatePath(store: EvolutionStore, cycleId: string, operationId: string): string {
            return join(operationDirectory(store, cycleId), `${operationId.replace(":", "-")}.candidate.json`);
          }

          function atomicWriteJsonSync(path: string, value: unknown): void {
            mkdirSync(dirname(path), { recursive: true, mode: 0o700 });
            const temporary = `${path}.${process.pid}.${randomUUID()}.tmp`;
            const descriptor = openSync(temporary, "wx", 0o600);
            try {
              writeFileSync(descriptor, `${JSON.stringify(value, null, 2)}\n`, "utf8");
              fsyncSync(descriptor);
            } finally {
              closeSync(descriptor);
            }
            renameSync(temporary, path);
            try {
              const directory = openSync(dirname(path), "r");
              try {
                fsyncSync(directory);
              } finally {
                closeSync(directory);
              }
            } catch {
              // Directory fsync is not available on every supported platform.
            }
          }
          ''',
          )

          replace_once(
              module,
              '''function processState(ownerHost: string, pid: number | null): DeliveryProcessState {
            if (pid === null) return "not-recorded";
            if (ownerHost !== hostname()) return "foreign-host";
            try {
              process.kill(pid, 0);
              return "alive";
            } catch (error) {
              return (error as NodeJS.ErrnoException).code === "EPERM" ? "alive" : "dead";
            }
          }
          ''',
              '''function processState(ownerHost: string, pid: number | null): DeliveryProcessState {
            if (pid === null) return "not-recorded";
            if (ownerHost !== hostname()) return "foreign-host";
            try {
              process.kill(pid, 0);
              return "alive";
            } catch (error) {
              return (error as NodeJS.ErrnoException).code === "EPERM" ? "alive" : "dead";
            }
          }

          function childProcessState(ownerHost: string, pid: number | null): DeliveryProcessState {
            if (pid === null || ownerHost !== hostname() || process.platform === "win32") {
              return processState(ownerHost, pid);
            }
            try {
              process.kill(-pid, 0);
              return "alive";
            } catch (error) {
              if ((error as NodeJS.ErrnoException).code === "EPERM") return "alive";
              return processState(ownerHost, pid);
            }
          }
          ''',
          )

          replace_once(
              module,
              '''  const path = checkpointPath(store, cycleId);
            const lockPresent = existsSync(lockPath(store, cycleId));
            if (!existsSync(path)) {
              return {
                controlStatus: "missing",
                record: null,
                lockPresent,
                ownerState: "not-recorded",
                childState: "not-recorded",
                disposition: lockPresent ? "blocked" : "healthy",
                findings: lockPresent
                  ? ["delivery operation lock exists without a durable checkpoint"]
                  : [],
              };
            }

            let record: DeliveryOperationRecord;
            try {
              record = readRecord(path);
            } catch (error) {
              return {
                controlStatus: "invalid",
                record: null,
                lockPresent,
                ownerState: "not-recorded",
                childState: "not-recorded",
                disposition: "blocked",
                findings: [error instanceof Error ? error.message : String(error)],
              };
            }

            const ownerState = processState(record.ownerHost, record.ownerPid);
            const childState = processState(record.ownerHost, record.childPid);
            const findings: string[] = [];
          ''',
              '''  const path = checkpointPath(store, cycleId);
            const acquisitionPath = lockPath(store, cycleId);
            const lockPresent = existsSync(acquisitionPath);
            if (!existsSync(path) && !lockPresent) {
              return {
                controlStatus: "missing",
                record: null,
                lockPresent: false,
                ownerState: "not-recorded",
                childState: "not-recorded",
                disposition: "healthy",
                findings: [],
              };
            }

            let record: DeliveryOperationRecord;
            const checkpointFindings: string[] = [];
            try {
              if (existsSync(path)) {
                record = readRecord(path);
              } else {
                record = readRecord(acquisitionPath);
                checkpointFindings.push(
                  "primary checkpoint is missing; using the integrity-valid acquisition lock record"
                );
              }
            } catch (error) {
              return {
                controlStatus: "invalid",
                record: null,
                lockPresent,
                ownerState: "not-recorded",
                childState: "not-recorded",
                disposition: "blocked",
                findings: [error instanceof Error ? error.message : String(error)],
              };
            }

            const ownerState = processState(record.ownerHost, record.ownerPid);
            const childState = childProcessState(record.ownerHost, record.childPid);
            const findings: string[] = [...checkpointFindings];
          ''',
          )

          replace_once(
              module,
              '''function acquireOperationLock(store: EvolutionStore, cycleId: string): void {
            const directory = operationDirectory(store, cycleId);
            mkdirSync(directory, { recursive: true, mode: 0o700 });
            try {
              mkdirSync(lockPath(store, cycleId), { mode: 0o700 });
            } catch (error) {
              if ((error as NodeJS.ErrnoException).code !== "EEXIST") throw error;
              const inspection = inspectDeliveryOperation(store, cycleId);
              throw new DeliveryOperationError(
                `delivery operation lease is ${inspection.disposition}: ${inspection.findings.join("; ") || "another operation owns the lock"}`
              );
            }
          }

          function releaseOperationLock(store: EvolutionStore, cycleId: string): void {
            rmSync(lockPath(store, cycleId), { recursive: true, force: true });
          }
          ''',
              '''function acquireOperationLock(
            store: EvolutionStore,
            cycleId: string,
            preparedCheckpointPath: string
          ): void {
            const directory = operationDirectory(store, cycleId);
            mkdirSync(directory, { recursive: true, mode: 0o700 });
            try {
              linkSync(preparedCheckpointPath, lockPath(store, cycleId));
            } catch (error) {
              if ((error as NodeJS.ErrnoException).code !== "EEXIST") throw error;
              const inspection = inspectDeliveryOperation(store, cycleId);
              throw new DeliveryOperationError(
                `delivery operation lease is ${inspection.disposition}: ${inspection.findings.join("; ") || "another operation owns the lock"}`
              );
            }
          }

          function releaseOperationLock(store: EvolutionStore, cycleId: string): void {
            rmSync(lockPath(store, cycleId), { force: true });
          }
          ''',
          )

          replace_once(
              module,
              '''  acquireOperationLock(input.store, input.cycleId);
            const path = checkpointPath(input.store, input.cycleId);
            const startedAt = input.now ?? new Date().toISOString();
            let record = withDigest({
          ''',
              '''  const path = checkpointPath(input.store, input.cycleId);
            const startedAt = input.now ?? new Date().toISOString();
            let record = withDigest({
          ''',
          )

          replace_once(
              module,
              '''  try {
            atomicWriteJsonSync(path, record);
          } catch (error) {
            releaseOperationLock(input.store, input.cycleId);
            throw error;
          }

          let heartbeatFailure: Error | null = null;
          ''',
              '''  const preparedCheckpointPath = candidatePath(
            input.store,
            input.cycleId,
            record.operationId
          );
            atomicWriteJsonSync(preparedCheckpointPath, record);
            let acquired = false;
            try {
              acquireOperationLock(input.store, input.cycleId, preparedCheckpointPath);
              acquired = true;
              renameSync(preparedCheckpointPath, path);
            } catch (error) {
              rmSync(preparedCheckpointPath, { force: true });
              if (acquired) releaseOperationLock(input.store, input.cycleId);
              throw error;
            }

            let heartbeatFailure: Error | null = null;
          ''',
          )

          test = "packages/evolution-core/src/delivery-operation.test.ts"
          replace_once(
              test,
              'import { mkdir, mkdtemp, readFile, rm, writeFile } from "node:fs/promises";\n',
              'import { copyFile, mkdir, mkdtemp, readFile, rm, unlink, writeFile } from "node:fs/promises";\n',
          )
          replace_once(
              test,
              '''    await mkdir(lockPath(current.store, current.cycleId), { recursive: true });

            const inspected = await reconcileDeliveryOperation({
          ''',
              '''    await copyFile(
              operationPath(current.store, current.cycleId),
              lockPath(current.store, current.cycleId)
            );

            const inspected = await reconcileDeliveryOperation({
          ''',
          )
          replace_once(
              test,
              '''    await mkdir(dirname(lockPath(current.store, current.cycleId)), { recursive: true });
            await mkdir(lockPath(current.store, current.cycleId), { recursive: true });

            const result = await reconcileDeliveryOperation({
          ''',
              '''    await mkdir(dirname(lockPath(current.store, current.cycleId)), { recursive: true });
            await copyFile(
              operationPath(current.store, current.cycleId),
              lockPath(current.store, current.cycleId)
            );

            const result = await reconcileDeliveryOperation({
          ''',
          )
          replace_once(
              test,
              '''  it("refuses to clear a lease while a recorded child process is alive", async () => {
          ''',
              '''  it("recovers an acquisition lock when the primary checkpoint was never renamed", async () => {
            const current = await fixture("acquisition-only");
            await withDeliveryOperation(
              {
                store: current.store,
                cycleId: current.cycleId,
                projectRoot: current.projectRoot,
                actor: "fixture-operator",
                operation: "execute",
              },
              async () => "done"
            );
            await replaceRecord(current.store, current.cycleId, (record) => ({
              ...record,
              ownerPid: 999_999_999,
              childPid: null,
              completedAt: null,
              status: "running",
            }));
            await copyFile(
              operationPath(current.store, current.cycleId),
              lockPath(current.store, current.cycleId)
            );
            await unlink(operationPath(current.store, current.cycleId));

            const inspection = inspectDeliveryOperation(current.store, current.cycleId);
            expect(inspection.controlStatus).toBe("valid");
            expect(inspection.disposition).toBe("stale");
            expect(inspection.findings.join(" ")).toMatch(/acquisition lock record/);

            const applied = await reconcileDeliveryOperation({
              store: current.store,
              cycleId: current.cycleId,
              projectRoot: current.projectRoot,
              actor: "recovery-operator",
              apply: true,
            });
            expect(applied.applied).toBe(true);
            expect(applied.record?.status).toBe("abandoned");
            expect(inspectDeliveryOperation(current.store, current.cycleId).lockPresent).toBe(false);
          });

          it("refuses to clear a lease while a recorded child process is alive", async () => {
          ''',
          )

          for path in [
              "docs/evolution/DELIVERY_OPERATION_LEASES.md",
              "docs/ai/plans/2026-07-24-delivery-operation-checkpoints.md",
          ]:
              file_path = Path(path)
              text = file_path.read_text(encoding="utf-8")
              text = text.replace("lock directory", "lock file")
              text = text.replace("lock directories", "lock files")
              file_path.write_text(text, encoding="utf-8")

          print("delivery operation acquisition hardening applied")
          PY
          git diff --check

      - name: Commit hardened implementation
        run: |
          rm .github/workflows/harden-delivery-operation-lock.yml
          git config user.name "CycleWarden Automation"
          git config user.email "cyclewarden@local"
          git add --all
          git commit -m "Harden delivery operation lock acquisition"
          git push origin HEAD:${{ github.ref_name }}
