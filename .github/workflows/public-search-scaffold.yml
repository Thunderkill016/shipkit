name: Public Search Scaffold

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  scaffold:
    if: ${{ github.actor != 'github-actions[bot]' && github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Materialize public search baseline
        run: |
          set -euo pipefail
          cat .shipkit-scaffold/public-search-payload-*.b64 | base64 -d > /tmp/public-search-payload.tar.gz
          tar -xzf /tmp/public-search-payload.tar.gz -C .
          node .shipkit-public-search-scaffold.cjs
          rm .shipkit-public-search-scaffold.cjs
          rm -rf .shipkit-scaffold
          rm .github/workflows/public-search-scaffold.yml
      - name: Commit public search baseline
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Add minimal reproducible public search discovery"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
