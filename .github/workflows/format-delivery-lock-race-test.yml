name: Format delivery lock authority regression

on:
  push:
    branches:
      - agent/delivery-operation-checkpoints
    paths:
      - .github/workflows/format-delivery-lock-race-test.yml

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Format regression block
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("packages/evolution-core/src/delivery-operation.test.ts")
          text = path.read_text(encoding="utf-8")
          start = text.index('  it("prefers a different active acquisition lock')
          end_marker = 'it("recovers an acquisition lock when the primary checkpoint was never renamed"'
          end = text.index(end_marker, start)
          block = text[start:end]
          lines = block.splitlines()
          formatted = [lines[0]] + [f"  {line}" for line in lines[1:]]
          replacement = "\n".join(formatted).rstrip() + "\n\n  "
          path.write_text(text[:start] + replacement + text[end:], encoding="utf-8")
          PY
          git diff --check

      - name: Commit formatting
        run: |
          rm .github/workflows/format-delivery-lock-race-test.yml
          git config user.name "CycleWarden Automation"
          git config user.email "cyclewarden@local"
          git add --all
          git commit -m "Format delivery lock authority regression"
          git push origin HEAD:${{ github.ref_name }}
