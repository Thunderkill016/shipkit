name: Public Search Diagnostics

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  fix-public-search-failure-path:
    if: ${{ github.actor != 'github-actions[bot]' && github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          fetch-depth: 0
      - name: Preserve state-machine invariants and deterministic time
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('packages/evolution-core/src/public-search.ts')
          text = path.read_text()
          old = '    addArtifacts: { diagnosis: input.evidenceRefs },'
          new = '    addArtifacts: { diagnosis: input.evidenceRefs, candidates: input.evidenceRefs },'
          if text.count(old) != 1:
              raise SystemExit('failure-path artifact anchor missing or duplicated')
          text = text.replace(old, new)
          old_time = '          Math.max(0, Date.now() - Date.parse(startedAt)) / 60_000'
          new_time = '          Math.max(0, Date.parse(now) - Date.parse(startedAt)) / 60_000'
          if text.count(old_time) != 1:
              raise SystemExit('time-budget anchor missing or duplicated')
          text = text.replace(old_time, new_time)
          path.write_text(text)
          PY
      - name: Commit invariant fixes
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packages/evolution-core/src/public-search.ts
          git commit -m "Preserve public search failure invariants"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
