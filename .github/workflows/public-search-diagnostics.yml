name: Public Search Diagnostics

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  public-search-tests:
    name: Focused public search tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run focused public-search tests
        shell: bash
        run: |
          set +e
          mkdir -p artifacts
          pnpm --filter @shipkit/evolution-core exec vitest run src/public-search.test.ts --reporter=verbose > artifacts/public-search-test.log 2>&1
          status=$?
          tail -n 120 artifacts/public-search-test.log
          exit "$status"
      - name: Upload focused diagnostics
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: public-search-test-diagnostics
          retention-days: 2
          path: artifacts/public-search-test.log
