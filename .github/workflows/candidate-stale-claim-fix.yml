name: Candidate Research Stale Claim Fix

on:
  push:
    branches:
      - agent/candidate-grounded-research

permissions:
  contents: write

jobs:
  patch:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/candidate-grounded-research
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Replace stale global sandbox statement
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const sourcePath = 'packages/evolution-core/src/repository-research.ts';
          let source = fs.readFileSync(sourcePath, 'utf8');
          const oldClaim = `        "A technically green temporary workspace remains trusted-local-only because filesystem, process, dependency, secret, and network containment are not proven.",`;
          const newClaim = `        "This repository assessment used the trusted-local path, which is not a security sandbox. Shipkit separately exposes a verified Docker sandbox baseline; its current capability limits must be read from the capability registry before any execution handoff.",`;
          const oldUncertainty = `      uncertainty: "A future sandbox backend may prove stronger containment for a specific environment.",`;
          const newUncertainty = `      uncertainty: "The selected assessment path and the available Docker backend provide different guarantees; neither establishes product value or authorizes agent execution.",`;
          const oldSummary = `          "Passing technical checks can coexist with an unproven execution-security boundary.",`;
          const newSummary = `          "Passing trusted-local checks can coexist with a separately available Docker sandbox baseline and different remaining limitations.",`;
          const oldCause = `          "Technical correctness checks and sandbox containment answer different questions.",`;
          const newCause = `          "Technical correctness, the selected trusted-local path, and the available Docker containment capability answer different questions.",`;
          for (const [oldValue, newValue, label] of [
            [oldClaim, newClaim, 'claim'],
            [oldUncertainty, newUncertainty, 'uncertainty'],
            [oldSummary, newSummary, 'summary'],
            [oldCause, newCause, 'cause'],
          ]) {
            if (!source.includes(newValue)) {
              if (!source.includes(oldValue)) throw new Error(`missing ${label} replacement target`);
              source = source.replace(oldValue, newValue);
            }
          }
          fs.writeFileSync(sourcePath, source);

          const testPath = 'packages/evolution-core/src/repository-research.test.ts';
          let test = fs.readFileSync(testPath, 'utf8');
          const anchor = `    expect(prepared.records.executionHandoff.parameterDigest).toMatch(/^[a-f0-9]{64}$/);`;
          const additions = `${anchor}\n    expect(\n      prepared.records.claims.some((claim) =>\n        claim.statement.includes("This repository assessment used the trusted-local path")\n      )\n    ).toBe(true);\n    expect(\n      prepared.records.claims.some((claim) => claim.statement.includes("verified Docker sandbox baseline"))\n    ).toBe(true);\n    expect(\n      prepared.records.claims.some((claim) => claim.statement.includes("future sandbox backend"))\n    ).toBe(false);`;
          if (!test.includes('This repository assessment used the trusted-local path')) {
            if (!test.includes(anchor)) throw new Error('repository research test anchor missing');
            test = test.replace(anchor, additions);
            fs.writeFileSync(testPath, test);
          }
          NODE
      - name: Commit stale-claim correction
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packages/evolution-core/src/repository-research.ts packages/evolution-core/src/repository-research.test.ts
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Derive repository sandbox claims from current execution boundary"
          git push origin HEAD:agent/candidate-grounded-research
